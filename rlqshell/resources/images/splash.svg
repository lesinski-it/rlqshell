<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
<linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
</linearGradient>
<linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#06b6d4"/>
<stop offset="100%" stop-color="#67e8f9"/>
</linearGradient>
</defs>

<rect x="40" y="20" width="600" height="440" rx="20" fill="url(#bg-grad)"/>
<rect x="40" y="20" width="600" height="440" rx="20" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.35"/>

<rect x="40" y="20" width="600" height="60" rx="20" fill="url(#glow)"/>
<rect x="40" y="60" width="600" height="20" fill="url(#glow)"/>

<!-- Terminal + lock motif (private SSH client) -->
<rect x="280" y="100" width="120" height="90" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.4" opacity="0.75"/>
<rect x="280" y="100" width="120" height="22" rx="12" fill="#06b6d4" opacity="0.14"/>
<rect x="280" y="110" width="120" height="12" fill="#06b6d4" opacity="0.14"/>
<circle cx="293" cy="111" r="3.5" fill="#ef4444" opacity="0.85"/>
<circle cx="304" cy="111" r="3.5" fill="#f59e0b" opacity="0.85"/>
<circle cx="315" cy="111" r="3.5" fill="#22c55e" opacity="0.85"/>

<text x="295" y="150" font-family="monospace" font-size="13" fill="#06b6d4" opacity="0.95">$_</text>
<rect x="295" y="158" width="80" height="2" rx="1" fill="#06b6d4" opacity="0.18"/>
<rect x="295" y="166" width="55" height="2" rx="1" fill="#06b6d4" opacity="0.13"/>

<!-- Lock badge in top-right corner of terminal — "private" indicator -->
<circle cx="395" cy="105" r="11" fill="#0f172a" stroke="#06b6d4" stroke-width="1.2"/>
<rect x="391" y="103" width="8" height="7" rx="1" fill="none" stroke="#67e8f9" stroke-width="1.1"/>
<path d="M 392.5 103 L 392.5 100.5 Q 395 98.5 397.5 100.5 L 397.5 103" fill="none" stroke="#67e8f9" stroke-width="1.1"/>
<circle cx="395" cy="106.5" r="0.8" fill="#67e8f9"/>

<!-- Connection lines radiating from terminal -->
<line x1="278" y1="130" x2="160" y2="100" stroke="#06b6d4" stroke-width="0.7" opacity="0.28"/>
<line x1="278" y1="145" x2="140" y2="160" stroke="#06b6d4" stroke-width="0.7" opacity="0.22"/>
<line x1="278" y1="160" x2="155" y2="210" stroke="#06b6d4" stroke-width="0.7" opacity="0.16"/>
<line x1="402" y1="130" x2="520" y2="95" stroke="#06b6d4" stroke-width="0.7" opacity="0.28"/>
<line x1="402" y1="145" x2="540" y2="155" stroke="#06b6d4" stroke-width="0.7" opacity="0.22"/>
<line x1="402" y1="160" x2="525" y2="215" stroke="#06b6d4" stroke-width="0.7" opacity="0.16"/>

<!-- Server / cloud dots -->
<circle cx="155" cy="97" r="5" fill="#06b6d4" opacity="0.32"/><circle cx="155" cy="97" r="2.5" fill="#06b6d4" opacity="0.75"/>
<circle cx="135" cy="160" r="5" fill="#06b6d4" opacity="0.27"/><circle cx="135" cy="160" r="2.5" fill="#06b6d4" opacity="0.65"/>
<circle cx="150" cy="213" r="5" fill="#06b6d4" opacity="0.22"/><circle cx="150" cy="213" r="2.5" fill="#06b6d4" opacity="0.55"/>
<circle cx="525" cy="92" r="5" fill="#06b6d4" opacity="0.32"/><circle cx="525" cy="92" r="2.5" fill="#06b6d4" opacity="0.75"/>
<circle cx="545" cy="155" r="5" fill="#06b6d4" opacity="0.27"/><circle cx="545" cy="155" r="2.5" fill="#06b6d4" opacity="0.65"/>
<circle cx="530" cy="218" r="5" fill="#06b6d4" opacity="0.22"/><circle cx="530" cy="218" r="2.5" fill="#06b6d4" opacity="0.55"/>

<!-- App name -->
<text x="340" y="278" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="44" font-weight="600" fill="url(#accent-grad)" letter-spacing="2">RLQShell</text>

<!-- Tagline -->
<text x="340" y="310" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#06b6d4" opacity="0.7" letter-spacing="4">PRIVATE CLOUD SSH CLIENT</text>

<!-- Separator line -->
<line x1="260" y1="328" x2="420" y2="328" stroke="#06b6d4" stroke-width="0.5" opacity="0.22"/>

<!-- Loading bar background -->
<rect x="220" y="370" width="240" height="4" rx="2" fill="#06b6d4" opacity="0.1"/>
<!-- Loading bar fill — width replaced dynamically -->
<rect x="220" y="370" width="0" height="4" rx="2" fill="#06b6d4" opacity="0.6" id="splash-progress-bar"/>

<!-- Loading text — content replaced dynamically -->
<text x="340" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#06b6d4" opacity="0.4" id="splash-status">Initializing…</text>

<!-- Version — content replaced dynamically -->
<text x="340" y="435" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" opacity="0.45" id="splash-version">v0.1.0</text>

<!-- Subtle grid dots -->
<g opacity="0.05" fill="#06b6d4">
<circle cx="100" cy="60" r="1"/><circle cx="140" cy="60" r="1"/><circle cx="180" cy="60" r="1"/><circle cx="220" cy="60" r="1"/>
<circle cx="460" cy="60" r="1"/><circle cx="500" cy="60" r="1"/><circle cx="540" cy="60" r="1"/><circle cx="580" cy="60" r="1"/>
<circle cx="100" cy="420" r="1"/><circle cx="140" cy="420" r="1"/><circle cx="180" cy="420" r="1"/><circle cx="220" cy="420" r="1"/>
<circle cx="460" cy="420" r="1"/><circle cx="500" cy="420" r="1"/><circle cx="540" cy="420" r="1"/><circle cx="580" cy="420" r="1"/>
<circle cx="80" cy="300" r="1"/><circle cx="80" cy="340" r="1"/><circle cx="80" cy="380" r="1"/>
<circle cx="600" cy="300" r="1"/><circle cx="600" cy="340" r="1"/><circle cx="600" cy="380" r="1"/>
</g>
</svg>
