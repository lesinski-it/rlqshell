<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- RLQShell monogram: rounded square + ">_" terminal prompt + lock dot -->
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#lg)"/>
  <!-- terminal prompt arrow -->
  <path d="M 9 11 L 14 16 L 9 21" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- prompt cursor underline -->
  <line x1="16" y1="21" x2="22" y2="21" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <!-- private indicator dot -->
  <circle cx="24" cy="9" r="2.5" fill="#67e8f9" stroke="#0f172a" stroke-width="0.8"/>
</svg>
