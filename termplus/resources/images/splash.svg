<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0F1923"/>
<stop offset="100%" stop-color="#1A2B3D"/>
</linearGradient>
<linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#22D3EE" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
</linearGradient>
</defs>

<rect x="40" y="20" width="600" height="440" rx="20" fill="url(#bg-grad)"/>
<rect x="40" y="20" width="600" height="440" rx="20" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.3"/>

<rect x="40" y="20" width="600" height="60" rx="20" fill="url(#glow)"/>
<rect x="40" y="60" width="600" height="20" fill="url(#glow)"/>

<!-- Terminal prompt icon -->
<rect x="280" y="100" width="120" height="90" rx="12" fill="none" stroke="#22D3EE" stroke-width="1.2" opacity="0.7"/>
<rect x="280" y="100" width="120" height="22" rx="12" fill="#22D3EE" opacity="0.12"/>
<rect x="280" y="110" width="120" height="12" fill="#22D3EE" opacity="0.12"/>
<circle cx="293" cy="111" r="3.5" fill="#EF4444" opacity="0.8"/>
<circle cx="304" cy="111" r="3.5" fill="#F59E0B" opacity="0.8"/>
<circle cx="315" cy="111" r="3.5" fill="#22C55E" opacity="0.8"/>

<text x="295" y="150" font-family="monospace" font-size="13" fill="#22D3EE" opacity="0.9">$_</text>
<rect x="295" y="158" width="80" height="2" rx="1" fill="#22D3EE" opacity="0.15"/>
<rect x="295" y="166" width="55" height="2" rx="1" fill="#22D3EE" opacity="0.1"/>

<!-- Connection lines radiating from terminal -->
<line x1="278" y1="130" x2="160" y2="100" stroke="#22D3EE" stroke-width="0.7" opacity="0.25"/>
<line x1="278" y1="145" x2="140" y2="160" stroke="#22D3EE" stroke-width="0.7" opacity="0.2"/>
<line x1="278" y1="160" x2="155" y2="210" stroke="#22D3EE" stroke-width="0.7" opacity="0.15"/>
<line x1="402" y1="130" x2="520" y2="95" stroke="#22D3EE" stroke-width="0.7" opacity="0.25"/>
<line x1="402" y1="145" x2="540" y2="155" stroke="#22D3EE" stroke-width="0.7" opacity="0.2"/>
<line x1="402" y1="160" x2="525" y2="215" stroke="#22D3EE" stroke-width="0.7" opacity="0.15"/>

<!-- Server dots -->
<circle cx="155" cy="97" r="5" fill="#22D3EE" opacity="0.3"/><circle cx="155" cy="97" r="2.5" fill="#22D3EE" opacity="0.7"/>
<circle cx="135" cy="160" r="5" fill="#22D3EE" opacity="0.25"/><circle cx="135" cy="160" r="2.5" fill="#22D3EE" opacity="0.6"/>
<circle cx="150" cy="213" r="5" fill="#22D3EE" opacity="0.2"/><circle cx="150" cy="213" r="2.5" fill="#22D3EE" opacity="0.5"/>
<circle cx="525" cy="92" r="5" fill="#22D3EE" opacity="0.3"/><circle cx="525" cy="92" r="2.5" fill="#22D3EE" opacity="0.7"/>
<circle cx="545" cy="155" r="5" fill="#22D3EE" opacity="0.25"/><circle cx="545" cy="155" r="2.5" fill="#22D3EE" opacity="0.6"/>
<circle cx="530" cy="218" r="5" fill="#22D3EE" opacity="0.2"/><circle cx="530" cy="218" r="2.5" fill="#22D3EE" opacity="0.5"/>

<!-- App name -->
<text x="340" y="278" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="42" font-weight="500" fill="#ECFEFF" letter-spacing="3">TERMPLUS</text>

<!-- Tagline -->
<text x="340" y="310" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#22D3EE" opacity="0.6" letter-spacing="4">REMOTE CONNECTION MANAGER</text>

<!-- Separator line -->
<line x1="260" y1="328" x2="420" y2="328" stroke="#22D3EE" stroke-width="0.5" opacity="0.2"/>

<!-- Loading bar background -->
<rect x="220" y="370" width="240" height="4" rx="2" fill="#22D3EE" opacity="0.08"/>
<!-- Loading bar fill — width replaced dynamically -->
<rect x="220" y="370" width="0" height="4" rx="2" fill="#22D3EE" opacity="0.5" id="splash-progress-bar"/>

<!-- Loading text — content replaced dynamically -->
<text x="340" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#22D3EE" opacity="0.35" id="splash-status">Initializing…</text>

<!-- Version — content replaced dynamically -->
<text x="340" y="435" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94A3B8" opacity="0.4" id="splash-version">v0.1.0</text>

<!-- Subtle grid dots -->
<g opacity="0.04" fill="#22D3EE">
<circle cx="100" cy="60" r="1"/><circle cx="140" cy="60" r="1"/><circle cx="180" cy="60" r="1"/><circle cx="220" cy="60" r="1"/>
<circle cx="460" cy="60" r="1"/><circle cx="500" cy="60" r="1"/><circle cx="540" cy="60" r="1"/><circle cx="580" cy="60" r="1"/>
<circle cx="100" cy="420" r="1"/><circle cx="140" cy="420" r="1"/><circle cx="180" cy="420" r="1"/><circle cx="220" cy="420" r="1"/>
<circle cx="460" cy="420" r="1"/><circle cx="500" cy="420" r="1"/><circle cx="540" cy="420" r="1"/><circle cx="580" cy="420" r="1"/>
<circle cx="80" cy="300" r="1"/><circle cx="80" cy="340" r="1"/><circle cx="80" cy="380" r="1"/>
<circle cx="600" cy="300" r="1"/><circle cx="600" cy="340" r="1"/><circle cx="600" cy="380" r="1"/>
</g>
</svg>
