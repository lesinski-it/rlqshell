name: Build & Deploy RLQShell

# Trigger: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build_windows:
    runs-on: self-hosted
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Output "Building Windows version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update version in pyproject.toml
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $py = Get-Content pyproject.toml -Raw
          $py = $py -replace '(?m)^(\s*version\s*=\s*")[^"]+(")', "`${1}$v`${2}"
          Set-Content pyproject.toml -Value $py -NoNewline -Encoding utf8
          Write-Output "Patched pyproject.toml version to $v"

      - name: Install Python dependencies
        shell: powershell
        env:
          # aardwolf contains Rust/PyO3 extension. This keeps compatibility
          # with newer Python runtimes when abi3 wheels are needed.
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          python -c "import PySide6; print('PySide6 OK:', PySide6.__file__)"

      - name: Build EXE (PyInstaller)
        shell: powershell
        run: pyinstaller --noconfirm --clean rlqshell.spec

      - name: Bootstrap .NET SDK and WiX 6
        shell: powershell
        run: |
          # .NET SDK (per-user, no UAC) - required only for MSI build
          $dotnetDir = "$env:USERPROFILE\.dotnet"
          if (-not (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            Write-Output "Installing .NET SDK 8.0..."
            $installer = "$env:TEMP\dotnet-install.ps1"
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile $installer -UseBasicParsing
            & $installer -Channel 8.0 -InstallDir $dotnetDir
          }
          if (Test-Path $dotnetDir) {
            $env:PATH = "$dotnetDir;$env:PATH"
            $env:DOTNET_ROOT = $dotnetDir
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          Write-Output "dotnet version: $(dotnet --version)"

          # Pin WiX v6 (v7+ requires commercial OSMF license)
          $wixWanted = "6.0.2"
          $wixInstalled = $null
          try { $wixInstalled = (wix --version 2>$null) } catch { }
          if (-not $wixInstalled -or ($wixInstalled -notmatch [regex]::Escape($wixWanted))) {
            Write-Output "Installing WiX $wixWanted..."
            dotnet tool uninstall -g wix 2>$null
            dotnet tool install -g wix --version $wixWanted
          }
          Write-Output "WiX version: $(wix --version)"

          # UI extension required by WixUI_FeatureTree
          $extList = (wix extension list -g) 2>&1 | Out-String
          if ($extList -notmatch "WixToolset.UI.wixext") {
            Write-Output "Installing WixToolset.UI.wixext $wixWanted..."
            wix extension add -g "WixToolset.UI.wixext/$wixWanted"
          }
          wix extension list -g

      - name: Build MSI (WiX)
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"
          & installer/build-msi.ps1 -Version $v
          if ($LASTEXITCODE -ne 0) { throw "build-msi.ps1 failed" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          if-no-files-found: error
          path: |
            dist/RLQShell.exe
            dist/RLQShell-${{ steps.version.outputs.version }}-x64.msi

  build_linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          echo "Building Linux version: ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev binutils

      - name: Install Python dependencies
        shell: bash
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
          python -c "import PySide6; print('PySide6 OK:', PySide6.__file__)"

      - name: Build Linux DEB
        shell: bash
        run: |
          set -euo pipefail
          chmod +x installer/build-deb.sh
          bash installer/build-deb.sh --version "${{ steps.version.outputs.version }}" --arch amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          if-no-files-found: error
          path: dist/rlqshell_${{ steps.version.outputs.version }}_amd64.deb

  publish:
    runs-on: ubuntu-latest
    needs:
      - build_windows
      - build_linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          win_version="${{ needs.build_windows.outputs.version }}"
          linux_version="${{ needs.build_linux.outputs.version }}"

          if [[ -z "$win_version" || -z "$linux_version" ]]; then
            echo "Version output from build jobs is missing" >&2
            exit 1
          fi

          if [[ "$win_version" != "$linux_version" ]]; then
            echo "Version mismatch: windows=$win_version linux=$linux_version" >&2
            exit 1
          fi

          echo "version=$win_version" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-dist"
          merge-multiple: true
          path: dist

      - name: Normalize artifact layout
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"

          find dist -mindepth 2 -type f -name "RLQShell.exe" -exec mv -f {} dist/RLQShell.exe \;
          find dist -mindepth 2 -type f -name "RLQShell-${version}-x64.msi" -exec mv -f {} dist/ \;
          find dist -mindepth 2 -type f -name "rlqshell_${version}_*.deb" -exec mv -f {} dist/ \;

          test -f "dist/RLQShell.exe"
          test -f "dist/RLQShell-${version}-x64.msi"
          ls "dist/rlqshell_${version}_"*.deb >/dev/null

      - name: Show dist files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate version.json and index.html
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_release_assets.py "${{ steps.version.outputs.version }}"
          cat dist/version.json

      - name: Upload to FTP
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -euo pipefail
          python scripts/ftp_upload.py "${{ steps.version.outputs.version }}"
